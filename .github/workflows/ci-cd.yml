name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: voxly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: "22"
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/voxly
  NEXTAUTH_URL: https://example.com
  NEXTAUTH_SECRET: ci-placeholder-secret
  AWS_REGION: ${{ vars.AWS_REGION || 'ca-central-1' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Beanstalk package
        run: npm run package:beanstalk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy application version
        env:
          EB_APPLICATION_NAME: ${{ vars.AWS_BEANSTALK_APPLICATION_NAME }}
          EB_ENVIRONMENT_NAME: ${{ vars.AWS_BEANSTALK_ENVIRONMENT_NAME }}
          EB_DEPLOY_BUCKET: ${{ vars.AWS_BEANSTALK_DEPLOY_BUCKET }}
          VERSION_LABEL: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          test -n "$EB_APPLICATION_NAME"
          test -n "$EB_ENVIRONMENT_NAME"
          test -n "$EB_DEPLOY_BUCKET"

          aws s3 cp .dist/voxly-beanstalk.zip "s3://${EB_DEPLOY_BUCKET}/${VERSION_LABEL}.zip"

          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APPLICATION_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle "S3Bucket=${EB_DEPLOY_BUCKET},S3Key=${VERSION_LABEL}.zip" \
            --process

          aws elasticbeanstalk update-environment \
            --environment-name "$EB_ENVIRONMENT_NAME" \
            --version-label "$VERSION_LABEL"

          aws elasticbeanstalk wait environment-updated \
            --environment-names "$EB_ENVIRONMENT_NAME"
