name: Deploy Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: voxly-492205
  GCP_REGION: us-central1
  AR_REPOSITORY: voxly
  SERVICE_NAME: voxly
  IMAGE_NAME: voxly
  NODE_VERSION: "22"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/voxly
      NEXTAUTH_URL: https://example.com
      NEXTAUTH_SECRET: ci-placeholder-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx tsc --noEmit

      - run: npm run build

  deploy:
    name: Build and deploy
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - id: image
        name: Compute image tag
        run: |
          echo "tag=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tag }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.image.outputs.tag }}

      - name: Show service URL
        run: echo "Deployed ${{ steps.deploy.outputs.url }}"
